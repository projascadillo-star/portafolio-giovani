<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Semanal - Giovani R01124B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .work-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .work-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">📘</div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Portafolio Semanal</h1>
                    <p class="text-sm text-gray-500 -mt-1">Giovani • R01124B</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <a href="#portafolio" class="flex items-center gap-2 text-gray-700 hover:text-blue-600">Ver Portafolio</a>
                <button onclick="toggleLoginModal()" id="btn-login" class="bg-blue-600 text-white px-6 py-3 rounded-3xl font-semibold">Iniciar sesión</button>
                <button onclick="showAddModal()" id="btn-add" class="hidden bg-emerald-600 text-white px-6 py-3 rounded-3xl font-semibold">+ Agregar Semana</button>
                <button onclick="logout()" id="btn-logout" class="hidden text-red-500 text-xl"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-20 text-center">
        <h2 class="text-5xl font-bold mb-3">Mi Portafolio de Trabajos Semanales</h2>
        <p class="text-xl text-blue-100">Archivos subidos a Supabase • Visible desde cualquier dispositivo</p>
    </header>

    <section id="portafolio" class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-bold mb-10">Trabajos por Semana</h2>
        <div id="works-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold mb-6">Iniciar sesión</h3>
            <input id="email" type="email" placeholder="r01124b@estudiante.com" class="w-full px-5 py-4 border rounded-2xl mb-4">
            <input id="password" type="password" placeholder="Contraseña" class="w-full px-5 py-4 border rounded-2xl mb-6">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-3xl font-semibold">Entrar</button>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4">
            <h3 class="text-2xl font-bold mb-6">Agregar trabajo de la semana</h3>
            <form onsubmit="handleUpload(event)">
                <input id="semana" type="number" min="1" placeholder="Número de semana" class="w-full px-5 py-4 border rounded-2xl mb-4" required>
                <input id="titulo" type="text" placeholder="Título del trabajo" class="w-full px-5 py-4 border rounded-2xl mb-4" required>
                <textarea id="descripcion" rows="3" placeholder="Descripción breve..." class="w-full px-5 py-4 border rounded-2xl mb-6" required></textarea>
                <input id="file" type="file" class="w-full mb-6" required>
                <div class="flex gap-3">
                    <button type="button" onclick="hideAddModal()" class="flex-1 py-4 border rounded-3xl">Cancelar</button>
                    <button type="submit" id="uploadBtn" class="flex-1 py-4 bg-emerald-600 text-white rounded-3xl font-semibold">Subir Archivo</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vxphoagxcllhealhieeh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4cGhvYWd4Y2xsaGVhbGhpZWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODA5MDksImV4cCI6MjA5MTI1NjkwOX0.eKzMCf-yFM1hZHiEZoxsg9kuPPvPBImsaljJjMxMSgM';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isLoggedIn = false;
        let works = [];

        // Cargar trabajos desde Supabase
        async function loadWorks() {
            const { data, error } = await supabaseClient
                .from('works')
                .select('*')
                .order('semana', { ascending: true });

            if (error) {
                console.error(error);
                return;
            }
            works = data || [];
            renderWorks();
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                alert("Error: " + error.message);
            } else {
                isLoggedIn = true;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('btn-add').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                loadWorks();
            }
        }

        async function handleUpload(e) {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            btn.textContent = "Subiendo...";
            btn.disabled = true;

            const file = document.getElementById('file').files[0];
            const semana = parseInt(document.getElementById('semana').value);
            const titulo = document.getElementById('titulo').value;
            const descripcion = document.getElementById('descripcion').value;

            const filePath = `semana${semana}/${Date.now()}-${file.name}`;

            try {
                // Subir archivo
                const { error: uploadError } = await supabaseClient.storage.from('portafolio').upload(filePath, file);
                if (uploadError) throw uploadError;

                const { data: urlData } = supabaseClient.storage.from('portafolio').getPublicUrl(filePath);

                // Guardar información en la tabla 'works'
                const { error: insertError } = await supabaseClient
                    .from('works')
                    .insert([{
                        semana: semana,
                        titulo: titulo,
                        descripcion: descripcion,
                        filename: file.name,
                        public_url: urlData.publicUrl
                    }]);

                if (insertError) throw insertError;

                alert("¡Trabajo subido correctamente!");
                hideAddModal();
                loadWorks();
            } catch (err) {
                alert("Error: " + err.message);
            }

            btn.textContent = "Subir Archivo";
            btn.disabled = false;
        }

        function renderWorks() {
            const container = document.getElementById('works-grid');
            container.innerHTML = '';

            if (works.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center py-20 text-gray-400">Aún no hay trabajos subidos</div>`;
                return;
            }

            works.forEach(work => {
                const div = document.createElement('div');
                div.className = "work-card bg-white rounded-3xl shadow-lg p-6";
                div.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="bg-blue-100 text-blue-700 px-4 py-2 rounded-3xl text-sm font-semibold">SEMANA ${work.semana}</span>
                        ${isLoggedIn ? `<button onclick="deleteWork(${work.id})" class="text-red-400"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                    <h3 class="text-2xl font-semibold mb-2">${work.titulo}</h3>
                    <p class="text-gray-600 mb-4">${work.descripcion}</p>
                    <a href="${work.public_url}" target="_blank" class="text-emerald-600 hover:underline flex items-center gap-2">
                        <i class="fas fa-download"></i> Descargar ${work.filename}
                    </a>
                `;
                container.appendChild(div);
            });
        }

        function deleteWork(id) {
            if (confirm('¿Eliminar este trabajo?')) {
                supabaseClient.from('works').delete().eq('id', id).then(() => loadWorks());
            }
        }

        function toggleLoginModal() { document.getElementById('login-modal').classList.toggle('hidden'); }
        function showAddModal() { if(isLoggedIn) document.getElementById('add-modal').classList.remove('hidden'); else alert("Inicia sesión primero"); }
        function hideAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
        function logout() { location.reload(); }

        // Inicializar
        window.onload = () => {
            loadWorks();
        };
    </script>
</body>
</html>
