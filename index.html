<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Semanal - Giovani R01124B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .work-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .work-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">📘</div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Portafolio Semanal</h1>
                    <p class="text-sm text-gray-500 -mt-1">Giovani • R01124B</p>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <a href="#portafolio" class="flex items-center gap-2 text-gray-700 hover:text-blue-600 font-medium">
                    <i class="fas fa-folder-open"></i> Ver Portafolio
                </a>
                <button onclick="toggleLoginModal()" id="btn-login" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-3xl font-semibold">
                    Iniciar sesión
                </button>
                <button onclick="showAddModal()" id="btn-add" 
                        class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-3xl font-semibold">
                    + Agregar Semana
                </button>
                <button onclick="logout()" id="btn-logout" 
                        class="hidden text-red-500 hover:text-red-600 text-xl">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-20 text-center">
        <h2 class="text-5xl font-bold mb-3">Mi Portafolio de Trabajos Semanales</h2>
        <p class="text-xl text-blue-100">Archivos públicos en GitHub Pages</p>
    </header>

    <section id="portafolio" class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-bold mb-10 text-gray-900">Trabajos por Semana</h2>
        <div id="works-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-bold mb-6">Iniciar sesión (Estudiante)</h3>
            <input id="email" type="email" placeholder="Correo electrónico" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4">
            <input id="password" type="password" placeholder="Contraseña" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-3xl font-semibold">Entrar</button>
            <p class="text-center text-xs text-gray-500 mt-6">
                r01124b@estudiante.com / Grc74648482
            </p>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full mx-4">
            <h3 class="text-2xl font-bold mb-6">Agregar trabajo de la semana</h3>
            <form onsubmit="handleAddWork(event)">
                <input id="semana" type="number" min="1" placeholder="Número de semana" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4" required>
                <input id="titulo" type="text" placeholder="Título del trabajo" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4" required>
                <textarea id="descripcion" rows="3" placeholder="Descripción breve..." class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6" required></textarea>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Archivo (PDF, Word, imágenes, etc.)</label>
                    <input id="file" type="file" class="w-full" required>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="hideAddModal()" class="flex-1 py-4 border border-gray-300 rounded-3xl">Cancelar</button>
                    <button type="submit" id="uploadBtn" class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold">Guardar Trabajo</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-10 text-center text-sm">
        Portafolio en GitHub Pages
    </footer>

    <script>
        let isLoggedIn = false;
        let works = [];

        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (email === "r01124b@estudiante.com" && password === "Grc74648482") {
                isLoggedIn = true;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('btn-add').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                alert("✅ Sesión iniciada");
                renderWorks();
            } else {
                alert("Credenciales incorrectas");
            }
        }

        function handleAddWork(e) {
            e.preventDefault();

            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            if (!file) {
                alert("Selecciona un archivo");
                return;
            }

            const semana = document.getElementById('semana').value;
            const titulo = document.getElementById('titulo').value;
            const descripcion = document.getElementById('descripcion').value;

            // Crear objeto con información del trabajo
            const newWork = {
                id: Date.now(),
                semana: parseInt(semana),
                titulo: titulo,
                descripcion: descripcion,
                fileName: file.name,
                // Nota: El archivo real debes subirlo manualmente a la carpeta "archivos" en GitHub
                filePath: `archivos/${file.name}`   // Cambia esto manualmente después
            };

            works.push(newWork);
            localStorage.setItem('portafolioWorks', JSON.stringify(works));
            renderWorks();
            hideAddModal();
            alert("Trabajo guardado.\n\nRecuerda subir el archivo manualmente a la carpeta 'archivos' en GitHub");
        }

        function renderWorks() {
            const container = document.getElementById('works-grid');
            container.innerHTML = '';

            if (works.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center py-20 text-gray-400">Aún no hay trabajos subidos</div>`;
                return;
            }

            works.forEach(work => {
                const cardHTML = `
                    <div class="work-card bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100">
                        <div class="p-6">
                            <div class="flex justify-between mb-4">
                                <span class="bg-blue-100 text-blue-700 px-4 py-2 rounded-3xl text-sm font-semibold">SEMANA ${work.semana}</span>
                                ${isLoggedIn ? `<button onclick="deleteWork(${work.id})" class="text-red-400"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                            <h3 class="text-2xl font-semibold mb-3">${work.titulo}</h3>
                            <p class="text-gray-600 mb-6">${work.descripcion}</p>
                            <a href="${work.filePath}" target="_blank" 
                               class="flex items-center gap-3 text-emerald-600 hover:text-emerald-700 font-medium">
                                <i class="fas fa-download"></i>
                                Descargar: ${work.fileName}
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function deleteWork(id) {
            if (confirm('¿Eliminar este trabajo?')) {
                works = works.filter(w => w.id !== id);
                localStorage.setItem('portafolioWorks', JSON.stringify(works));
                renderWorks();
            }
        }

        function toggleLoginModal() {
            document.getElementById('login-modal').classList.toggle('hidden');
        }

        function showAddModal() {
            if (!isLoggedIn) {
                alert("Inicia sesión primero");
                return;
            }
            document.getElementById('add-modal').classList.remove('hidden');
        }

        function hideAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function logout() {
            if (confirm('¿Cerrar sesión?')) {
                isLoggedIn = false;
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('btn-add').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
                renderWorks();
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('portafolioWorks');
            if (saved) works = JSON.parse(saved);
            renderWorks();
        };
    </script>
</body>
</html>
